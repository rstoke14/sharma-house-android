<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Old House - First Floor</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; width:100%; height:100%; background:#000; font-family: Arial, Helvetica, sans-serif; }
  #canvasContainer { position:fixed; top:0; left:0; width:100%; height:100%; }
  canvas { display:block; outline:none; }

  /* Crosshair */
  #crosshair {
    position:fixed; top:50%; left:50%; width:6px; height:6px;
    margin:-3px 0 0 -3px; border-radius:50%;
    background:rgba(255,255,255,0.55);
    box-shadow:0 0 2px rgba(0,0,0,0.8);
    pointer-events:none; z-index:20;
  }

  /* Desktop instructions */
  #blocker {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center;
    z-index:50; color:#eee; text-align:center; cursor:pointer;
  }
  #blocker .panel { max-width:520px; padding:30px; }
  #blocker h1 { font-weight:300; letter-spacing:2px; margin-bottom:10px; }
  #blocker p { color:#bbb; line-height:1.6; font-size:14px; }
  #blocker .key { display:inline-block; background:#333; border:1px solid #555; border-radius:4px; padding:2px 8px; margin:0 3px; font-size:12px; }

  /* Mobile controls */
  #mobileControls { position:fixed; inset:0; z-index:15; display:none; pointer-events:none; }
  .joyBase {
    position:absolute; left:28px; bottom:28px; width:120px; height:120px;
    border-radius:50%; background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.25);
    pointer-events:auto; touch-action:none;
  }
  .joyStick {
    position:absolute; left:35px; top:35px; width:50px; height:50px; border-radius:50%;
    background:rgba(255,255,255,0.3); border:2px solid rgba(255,255,255,0.4);
  }
  .lookArea {
    position:absolute; right:0; top:0; width:55%; height:100%; pointer-events:auto; touch-action:none;
  }
  #jumpBtn, #sprintBtn {
    position:absolute; bottom:34px; width:70px; height:70px; border-radius:50%;
    background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.3);
    color:#fff; font-size:12px; display:flex; align-items:center; justify-content:center;
    pointer-events:auto; touch-action:none; user-select:none;
  }
  #jumpBtn { right:28px; }
  #sprintBtn { right:112px; bottom:118px; width:60px; height:60px; }

  #fpsCounter {
    position:fixed; top:8px; left:8px; color:rgba(255,255,255,0.4); font-size:11px; z-index:20; font-family:monospace;
  }

  @media (pointer:coarse) {
    #mobileControls { display:block; }
    #blocker .desktopOnly { display:none; }
  }
</style>
</head>
<body>

<div id="canvasContainer"></div>
<div id="crosshair"></div>
<div id="fpsCounter"></div>

<div id="blocker">
  <div class="panel">
    <h1>THE HOUSE</h1>
    <p class="desktopOnly">
      Click to enter.<br><br>
      <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move &nbsp;
      Mouse Look &nbsp;
      <span class="key">Shift</span> Sprint &nbsp;
      <span class="key">Space</span> Jump &nbsp;
      <span class="key">Esc</span> Release mouse
    </p>
    <p style="display:none" class="mobileOnly">Tap to enter. Use the joystick to walk and the right side of the screen to look around.</p>
  </div>
</div>

<div id="mobileControls">
  <div class="joyBase" id="joyBase"><div class="joyStick" id="joyStick"></div></div>
  <div class="lookArea" id="lookArea"></div>
  <div id="sprintBtn">SPRINT</div>
  <div id="jumpBtn">JUMP</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================================
   OLD VICTORIAN HOUSE - FIRST FLOOR ONLY
   Single-file Three.js scene for a first-person psychological horror game.
   Real-world architectural scale: 1 unit = 1 meter.
   ============================================================================ */

/* -------------------------------------------------------------------------
   BASIC SETUP: renderer, scene, camera
   ------------------------------------------------------------------------- */
const container = document.getElementById('canvasContainer');

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
// Warm dim ambient fog for depth - subtle, not "horror fog", just interior haze
scene.fog = new THREE.Fog(0x1a1712, 8, 34);
scene.background = new THREE.Color(0x0b0a08);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
camera.position.set(0, 1.65, 5); // eye height ~1.65m

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* -------------------------------------------------------------------------
   MATERIALS (shared/reused to limit draw calls & memory)
   Procedural canvas textures give a "cleaned but old" believable look
   without needing external texture files.
   ------------------------------------------------------------------------- */
const texLoader = new THREE.TextureLoader();

// Utility: create a canvas and return a THREE.CanvasTexture
function makeCanvasTexture(w, h, drawFn, repeatX = 1, repeatY = 1) {
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  drawFn(ctx, w, h);
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  tex.anisotropy = 4;
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

// ---- Old wood floor texture (warm honey-brown planks, slight wear) ----
function drawWoodFloor(ctx, w, h) {
  const plankH = h / 8;
  for (let i = 0; i < 8; i++) {
    const base = 118 + Math.sin(i * 12.9) * 14;
    ctx.fillStyle = `rgb(${base + 30},${base + 10},${base - 25})`;
    ctx.fillRect(0, i * plankH, w, plankH);
    // plank seam
    ctx.fillStyle = 'rgba(30,18,10,0.5)';
    ctx.fillRect(0, i * plankH, w, 2);
    // wood grain streaks
    for (let g = 0; g < 18; g++) {
      const gy = i * plankH + Math.random() * plankH;
      ctx.strokeStyle = `rgba(60,35,15,${0.06 + Math.random() * 0.08})`;
      ctx.lineWidth = 1 + Math.random() * 1.5;
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.bezierCurveTo(w * 0.3, gy + (Math.random() - 0.5) * 6, w * 0.7, gy + (Math.random() - 0.5) * 6, w, gy);
      ctx.stroke();
    }
    // subtle wear/scuff near center
    for (let s = 0; s < 6; s++) {
      ctx.fillStyle = `rgba(40,25,12,${0.03 + Math.random() * 0.05})`;
      ctx.beginPath();
      ctx.ellipse(Math.random() * w, i * plankH + plankH / 2, 20 + Math.random() * 30, 4 + Math.random() * 4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}
const woodFloorMap = makeCanvasTexture(512, 512, drawWoodFloor, 6, 8);
const woodFloorRough = makeCanvasTexture(512, 512, (ctx, w, h) => {
  ctx.fillStyle = '#888'; ctx.fillRect(0, 0, w, h);
}, 6, 8);
const woodFloorMat = new THREE.MeshStandardMaterial({
  map: woodFloorMap, roughness: 0.75, metalness: 0.02
});

// ---- Old plaster wall texture (off-white, slight cracks & stains) ----
function drawPlasterWall(ctx, w, h) {
  ctx.fillStyle = '#cfc6b4';
  ctx.fillRect(0, 0, w, h);
  // noise/plaster texture
  const img = ctx.getImageData(0, 0, w, h);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 14;
    img.data[i] += n; img.data[i + 1] += n * 0.95; img.data[i + 2] += n * 0.85;
  }
  ctx.putImageData(img, 0, 0);
  // subtle water stain
  ctx.fillStyle = 'rgba(120,105,70,0.10)';
  ctx.beginPath();
  ctx.ellipse(w * 0.75, h * 0.15, 60, 90, 0.3, 0, Math.PI * 2);
  ctx.fill();
  // hairline cracks
  ctx.strokeStyle = 'rgba(60,50,35,0.25)';
  ctx.lineWidth = 1;
  for (let c = 0; c < 3; c++) {
    let x = Math.random() * w, y = Math.random() * h;
    ctx.beginPath();
    ctx.moveTo(x, y);
    for (let seg = 0; seg < 6; seg++) {
      x += (Math.random() - 0.5) * 40;
      y += (Math.random() - 0.5) * 40;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  // dust corner darkening handled via vertex shading/AO baked lightly
  ctx.fillStyle = 'rgba(20,15,8,0.10)';
  ctx.fillRect(0, 0, w, 12);
  ctx.fillRect(0, h - 12, w, 12);
}
const plasterMap = makeCanvasTexture(512, 512, drawPlasterWall, 2.5, 1.2);
const plasterWallMat = new THREE.MeshStandardMaterial({
  map: plasterMap, roughness: 0.92, metalness: 0.0
});

// Baseboard / trim material (dark aged wood)
const trimMat = new THREE.MeshStandardMaterial({ color: 0x3a2c1e, roughness: 0.6, metalness: 0.05 });

// ---- Ceiling (slightly warm off-white, flatter) ----
const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xe4dcc8, roughness: 0.95 });

// ---- Kitchen tile floor ----
function drawKitchenTile(ctx, w, h) {
  ctx.fillStyle = '#cabf9f';
  ctx.fillRect(0, 0, w, h);
  const cell = w / 4;
  ctx.strokeStyle = 'rgba(70,60,40,0.4)';
  ctx.lineWidth = 3;
  for (let i = 0; i <= 4; i++) {
    ctx.beginPath(); ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * cell); ctx.lineTo(w, i * cell); ctx.stroke();
  }
  for (let i = 0; i < 16; i++) {
    ctx.fillStyle = `rgba(90,80,55,${0.03 + Math.random() * 0.05})`;
    ctx.beginPath();
    ctx.ellipse(Math.random() * w, Math.random() * h, 15 + Math.random() * 25, 10 + Math.random() * 15, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}
const kitchenTileMap = makeCanvasTexture(512, 512, drawKitchenTile, 4, 4);
const kitchenFloorMat = new THREE.MeshStandardMaterial({ map: kitchenTileMap, roughness: 0.55 });

// ---- Bathroom ceramic floor/wall ----
function drawCeramic(ctx, w, h) {
  ctx.fillStyle = '#dcdcd4';
  ctx.fillRect(0, 0, w, h);
  const cell = w / 6;
  ctx.strokeStyle = 'rgba(140,140,130,0.6)';
  ctx.lineWidth = 2;
  for (let i = 0; i <= 6; i++) {
    ctx.beginPath(); ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * cell); ctx.lineTo(w, i * cell); ctx.stroke();
  }
  ctx.fillStyle = 'rgba(90,90,70,0.06)';
  for (let i = 0; i < 10; i++) {
    ctx.beginPath();
    ctx.ellipse(Math.random() * w, Math.random() * h, 10 + Math.random() * 15, 8, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}
const ceramicMap = makeCanvasTexture(512, 512, drawCeramic, 3, 3);
const ceramicFloorMat = new THREE.MeshStandardMaterial({ map: ceramicMap, roughness: 0.35 });
const ceramicWallMat = new THREE.MeshStandardMaterial({ map: ceramicMap, roughness: 0.3 });

// ---- Wood door material ----
function drawDoorWood(ctx, w, h) {
  ctx.fillStyle = '#5a3d24';
  ctx.fillRect(0, 0, w, h);
  for (let g = 0; g < 40; g++) {
    ctx.strokeStyle = `rgba(35,20,10,${0.08 + Math.random() * 0.1})`;
    ctx.lineWidth = 1;
    const y = Math.random() * h;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.bezierCurveTo(w * 0.3, y + 6, w * 0.7, y - 6, w, y);
    ctx.stroke();
  }
  // panel inset lines
  ctx.strokeStyle = 'rgba(20,10,5,0.5)';
  ctx.lineWidth = 6;
  ctx.strokeRect(w * 0.12, h * 0.08, w * 0.76, h * 0.38);
  ctx.strokeRect(w * 0.12, h * 0.54, w * 0.76, h * 0.38);
}
const doorWoodMap = makeCanvasTexture(256, 512, drawDoorWood, 1, 1);
const doorMat = new THREE.MeshStandardMaterial({ map: doorWoodMap, roughness: 0.55, metalness: 0.05 });
const doorFrameMat = new THREE.MeshStandardMaterial({ color: 0x2c2015, roughness: 0.6 });

// ---- Window glass & frame ----
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xbfd8e0, transparent: true, opacity: 0.25, roughness: 0.05,
  metalness: 0, transmission: 0.7, reflectivity: 0.4
});
const windowFrameMat = new THREE.MeshStandardMaterial({ color: 0xf5f0e0, roughness: 0.55 });

// ---- Metal / handle material ----
const metalMat = new THREE.MeshStandardMaterial({ color: 0x8a8478, roughness: 0.35, metalness: 0.85 });
const darkMetalMat = new THREE.MeshStandardMaterial({ color: 0x2b2b2b, roughness: 0.4, metalness: 0.8 });

// ---- Fabric materials (furniture) ----
const sofaFabricMat = new THREE.MeshStandardMaterial({ color: 0x5c4632, roughness: 0.9 });
const armchairFabricMat = new THREE.MeshStandardMaterial({ color: 0x6b4f3a, roughness: 0.9 });
const woodFurnMat = new THREE.MeshStandardMaterial({ color: 0x4a3222, roughness: 0.6, metalness: 0.05 });
const woodFurnMatLight = new THREE.MeshStandardMaterial({ color: 0x6b4a30, roughness: 0.6 });
const cabinetMat = new THREE.MeshStandardMaterial({ color: 0xe8e2d0, roughness: 0.55 });
const counterTopMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.4 });
const applianceMat = new THREE.MeshStandardMaterial({ color: 0xd8d8d8, roughness: 0.4, metalness: 0.6 });
const boxMat = new THREE.MeshStandardMaterial({ color: 0x8a6f4e, roughness: 0.85 });
const paperMat = new THREE.MeshStandardMaterial({ color: 0xe8e0c8, roughness: 0.9 });
const ceramicFixtureMat = new THREE.MeshStandardMaterial({ color: 0xf2f2ec, roughness: 0.25 });
const mirrorMat = new THREE.MeshStandardMaterial({ color: 0xaabbc4, roughness: 0.05, metalness: 0.9 });
const blackFabricMat = new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.85 });
const rugMat = new THREE.MeshStandardMaterial({ color: 0x7a2d2d, roughness: 0.95 });

/* -------------------------------------------------------------------------
   GEOMETRY GROUPS
   Static, never-moving geometry is merged per material at the end to
   minimize draw calls. We collect meshes into arrays keyed by "kind"
   and merge with BufferGeometryUtils-like manual approach.
   ------------------------------------------------------------------------- */
const staticGroup = new THREE.Group(); // walls, floor, ceiling, trim, windows, doors(frames)
const furnitureGroup = new THREE.Group(); // furniture (kept separate meshes, still merged by material where easy)
scene.add(staticGroup, furnitureGroup);

// Collision box list — for player-vs-geometry collision (AABB based, cheap for FPS collision)
const collisionBoxes = []; // each: {minX,maxX,minZ,maxZ,minY,maxY}

function addCollisionBox(x, z, sizeX, sizeZ, minY, maxY) {
  collisionBoxes.push({
    minX: x - sizeX / 2, maxX: x + sizeX / 2,
    minZ: z - sizeZ / 2, maxZ: z + sizeZ / 2,
    minY, maxY
  });
}

/* -------------------------------------------------------------------------
   COORDINATE PLAN
   Building footprint: 14m (X, width) x 16m (Z, depth)
   We place origin (0,0,0) at floor center of the whole footprint.
   X: -7 to +7   (west to east)
   Z: -8 to +8   (north to south) -- porch at north (-Z), store room at south (+Z)

   Layout (matching reference plan, translated to our axes):
     Z -8.0 to -5.5   : Front Porch (full width, unheated, open on north side)
     Z -5.5 to -0.5   : Living Room (west, big) + Main hall connecting
     Z -0.5 to  3.5   : Study (west) | Main Hall (center) | Guest WC (east)
     Z  3.5 to  7.0   : Dining (west) | Main hall extends | (east side wall)
     Z  7.0 to  8.0   : Kitchen (west) | Store Room (east)

   To keep this buildable & correct to spec room sizes, we lay rooms out
   left-to-right (X) and front-to-back (Z) in bands, matching given
   room dimensions as closely as the footprint allows.
   ------------------------------------------------------------------------- */

const EXT = 0.30;   // exterior wall thickness
const INT = 0.20;   // interior wall thickness
const WALL_H = 3.2; // wall height
const FLOOR_T = 0.25;

// Overall footprint (outer face to outer face)
const BW = 14; // width X
const BD = 16; // depth Z
const X0 = -BW / 2, X1 = BW / 2; // -7 .. 7
const Z0 = -BD / 2, Z1 = BD / 2; // -8 .. 8

/* -------------------------------------------------------------------------
   HELPER: build a wall segment as a box (with optional opening cut by
   assembling from parts instead of CSG, for performance & simplicity).
   We build walls as solid boxes, and create openings by simply not
   placing wall boxes across the door/window span (i.e., we author walls
   in segments already).
   ------------------------------------------------------------------------- */
// Explicit wall authoring function that supports baseY & height directly.
function wallSeg(axis, fixed, from, to, thickness, mat, baseY, height) {
  const len = to - from;
  if (len <= 0.001) return;
  const mid = (from + to) / 2;
  const geo = axis === 'x' ? new THREE.BoxGeometry(len, height, thickness) : new THREE.BoxGeometry(thickness, height, len);
  const mesh = new THREE.Mesh(geo, mat);
  if (axis === 'x') mesh.position.set(mid, baseY + height / 2, fixed);
  else mesh.position.set(fixed, baseY + height / 2, mid);
  mesh.castShadow = true; mesh.receiveShadow = true;
  staticGroup.add(mesh);
  if (axis === 'x') addCollisionBox(mid, fixed, len, thickness, baseY, baseY + height);
  else addCollisionBox(fixed, mid, thickness, len, baseY, baseY + height);
}

// Wall run with door/window holes -- final robust version
function wallRun(axis, fixed, start, end, thickness, mat, holes) {
  holes = (holes || []).slice().sort((a, b) => a.from - b.from);
  let cursor = start;
  holes.forEach(h => {
    if (h.from > cursor + 0.001) {
      wallSeg(axis, fixed, cursor, h.from, thickness, mat, 0, WALL_H);
    }
    // segment below opening
    if (h.bottom > 0.001) {
      wallSeg(axis, fixed, h.from, h.to, thickness, mat, 0, h.bottom);
    }
    // segment above opening
    if (h.top < WALL_H - 0.001) {
      wallSeg(axis, fixed, h.from, h.to, thickness, mat, h.top, WALL_H - h.top);
    }
    cursor = h.to;
  });
  if (end > cursor + 0.001) {
    wallSeg(axis, fixed, cursor, end, thickness, mat, 0, WALL_H);
  }
}

/* -------------------------------------------------------------------------
   FLOOR & CEILING (segmented by room for correct texture per area)
   ------------------------------------------------------------------------- */
function makeFloorPatch(cx, cz, sx, sz, mat) {
  const geo = new THREE.PlaneGeometry(sx, sz);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(cx, 0, cz);
  mesh.receiveShadow = true;
  staticGroup.add(mesh);
}
function makeCeilingPatch(cx, cz, sx, sz) {
  const geo = new THREE.PlaneGeometry(sx, sz);
  const mesh = new THREE.Mesh(geo, ceilingMat);
  mesh.rotation.x = Math.PI / 2;
  mesh.position.set(cx, WALL_H, cz);
  mesh.receiveShadow = true;
  staticGroup.add(mesh);
}

// Overall wood floor + ceiling (most rooms) as one big patch, then overlay tile in kitchen/bath
makeFloorPatch(0, 0, BW, BD, woodFloorMat);
makeCeilingPatch(0, 0, BW, BD);

/* -------------------------------------------------------------------------
   ROOM LAYOUT (final coordinates)
   We divide the 14 x 16 footprint into bands along Z:
     Porch:      Z -8.0 .. -5.5   (2.5m depth)
     Front rooms:Z -5.5 .. -0.5   Living(west 7.0 wide) | East wing (small hall stub)
     Mid rooms:  Z -0.5 ..  3.5   Study(west 4.0) | Hall(center 2.5) | WC(east ~2.0)
     Rear rooms: Z  3.5 ..  7.0   Dining(west) | Hall continues | East wall
     Back rooms: Z  7.0 ..  8.0(interior)/ extends to 8.0 ext : Kitchen | Store
   Adjusted to keep interior consistent & sum to 16m depth exactly.
   ------------------------------------------------------------------------- */

// Interior usable width after ext walls: 14 - 2*0.30 = 13.4 (X: -6.7 .. 6.7)
// Interior usable depth: 16 - 2*0.30 = 15.4 (Z: -7.7 .. 7.7)
const IX0 = X0 + EXT, IX1 = X1 - EXT; // -6.7, 6.7
const IZ0 = Z0 + EXT, IZ1 = Z1 - EXT; // -7.7, 7.7

// Z bands (interior)
const Z_PORCH_N = IZ0;            // -7.7
const Z_PORCH_S = IZ0 + 2.5;      // -5.2  (porch depth 2.5)
const Z_LIVING_S = Z_PORCH_S + 5.0;  // -0.2 (living room depth 5.0)
const Z_MID_S = Z_LIVING_S + 4.0;    // 3.8  (study/hall/wc depth 4.0)
const Z_REAR_S = Z_MID_S + 3.5;      // 7.3  (dining depth 3.5)
const Z_BACK_S = IZ1;                // 7.7  (kitchen/store, remaining ~0.4m -- extend as needed)

// Because room specs sum to more than available depth exactly, we allot:
// porch 2.5, living 5.0, mid-band 4.0, dining-band 3.5 => 15.0, leaving 0.4m for kitchen/store band.
// Kitchen/Store rooms need 4.0m depth per spec -- to honor spec dimensions faithfully
// we extend the building's usable interior for that band by using the full remaining
// footprint AND slightly reducing hall overlap, matching the reference plan where
// kitchen/store sit at the very back with the hall stopping at the dining room.
// We recompute: kitchen/store band gets its own 4.0m depth, so total = 2.5+5.0+4.0+3.5+4.0=19.0
// That exceeds 16m. To stay faithful to the *floor plan proportions* (as pictured) rather
// than the literal sum (impossible in 16m), we scale the rear bands down proportionally
// while preserving the specified LIVING/STUDY/PORCH rooms exactly (most gameplay-critical),
// and compress dining/kitchen/store bands to fit remaining depth. This keeps corridors >=2.2m
// and all rooms functionally spacious, matching the spirit of the reference image.

// Recompute bands to fit exactly in IZ0..IZ1 (15.4m) while keeping porch/living/mid exact:
const PORCH_D = 2.5;
const LIVING_D = 5.0;
const MID_D = 4.0;
const usedSoFar = PORCH_D + LIVING_D + MID_D; // 11.5
const remaining = (IZ1 - IZ0) - usedSoFar;    // 15.4 - 11.5 = 3.9
// split remaining between dining-band and kitchen/store-band proportionally to spec (3.5 : 4.0)
const DINING_D = remaining * (3.5 / 7.5);     // ~1.82
const BACK_D = remaining * (4.0 / 7.5);       // ~2.08

const zPorchN = IZ0;
const zPorchS = zPorchN + PORCH_D;
const zLivingS = zPorchS + LIVING_D;
const zMidS = zLivingS + MID_D;
const zDiningS = zMidS + DINING_D;
const zBackS = zDiningS + BACK_D; // == IZ1

/* -------------------------------------------------------------------------
   X divisions
   Living room west wall to Study/Hall/WC widths, matching reference plan:
   West block (Living/Study/Dining/Kitchen) vs East block (Hall/WC/Store)
   Living room spec width 7.0 -> place west wing from IX0 to IX0+7.0
   ------------------------------------------------------------------------- */
const xWestWall = IX0;              // -6.7

/* ===========================================================================
   BASEBOARDS (trim) along major interior room edges for believability
   Simple approach: thin boxes along wall bases in main rooms.
   =========================================================================== */
function baseboard(axis, fixed, from, to, offsetSign) {
  const len = to - from;
  if (len <= 0) return;
  const h = 0.12, t = 0.03;
  const mid = (from + to) / 2;
  const geo = axis === 'x' ? new THREE.BoxGeometry(len, h, t) : new THREE.BoxGeometry(t, h, len);
  const mesh = new THREE.Mesh(geo, trimMat);
  if (axis === 'x') mesh.position.set(mid, h / 2, fixed + offsetSign * t);
  else mesh.position.set(fixed + offsetSign * t, h / 2, mid);
  staticGroup.add(mesh);
}

/* ===========================================================================
   WINDOWS: glass panes + frames (visual only, holes already cut in walls)
   =========================================================================== */
function addWindow(axis, fixed, centerRun) {
  const w = WIN_W, h = WIN_H;
  const frameThick = 0.06;
  const group = new THREE.Group();
  // glass pane
  const glassGeo = new THREE.PlaneGeometry(w - frameThick * 2, h - frameThick * 2);
  const glass = new THREE.Mesh(glassGeo, glassMat);
  // frame (simple rectangle border using 4 thin boxes)
  const frameDepth = EXT + 0.02;
  const top = new THREE.Mesh(new THREE.BoxGeometry(w, frameThick, frameDepth), windowFrameMat);
  const bot = top.clone();
  const left = new THREE.Mesh(new THREE.BoxGeometry(frameThick, h, frameDepth), windowFrameMat);
  const right = left.clone();
  top.position.y = h / 2 - frameThick / 2;
  bot.position.y = -h / 2 + frameThick / 2;
  left.position.x = -w / 2 + frameThick / 2;
  right.position.x = w / 2 - frameThick / 2;
  // mullion cross
  const mullionV = new THREE.Mesh(new THREE.BoxGeometry(0.04, h - frameThick * 2, frameDepth * 0.6), windowFrameMat);
  const mullionH = new THREE.Mesh(new THREE.BoxGeometry(w - frameThick * 2, 0.04, frameDepth * 0.6), windowFrameMat);
  group.add(glass, top, bot, left, right, mullionV, mullionH);
  group.position.y = WIN_SILL + h / 2;

  if (axis === 'z') { // wall runs along Z, window faces X direction, fixed = X coord
    group.rotation.y = Math.PI / 2;
    group.position.set(fixed, group.position.y, centerRun);
  } else {
    group.position.set(centerRun, group.position.y, fixed);
  }
  group.traverse(o => { if (o.isMesh) { o.castShadow = false; o.receiveShadow = true; } });
  staticGroup.add(group);
}

  pivot.position.set(x, 0, z);
  pivot.rotation.y = rotationY;

  doorMesh.position.set(w / 2, h / 2, 0); // hinge at local origin
  doorMesh.castShadow = true; doorMesh.receiveShadow = true;

  const handle = new THREE.Mesh(new THREE.SphereGeometry(0.03, 8, 8), metalMat);
  handle.position.set(w - 0.08, 1.0, t / 2 + 0.03);
  pivot.add(handle);

  staticGroup.add(pivot);
}

  landing.position.set(stairX, landingY, stairZStart + tread * stepCount + 0.6);

}

/* ===========================================================================
   FURNITURE HELPERS
   =========================================================================== */
function box(sx, sy, sz, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), mat);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}
function place(mesh, x, y, z, rotY = 0) {
  mesh.position.set(x, y, z);
  mesh.rotation.y = rotY;
  furnitureGroup.add(mesh);
  return mesh;
}
function furnitureCollision(x, z, sx, sz, rotY = 0) {
  // Approximate rotated furniture as an AABB (safe over-estimate for small rotations we use 0/90 only)
  if (Math.abs(rotY % (Math.PI / 2)) < 0.01) {
    // axis aligned (0 or 90deg) -> swap dims if needed
    const isRot90 = Math.abs(((rotY / (Math.PI / 2)) % 2 + 2) % 2 - 1) < 0.5;
    const w = isRot90 ? sz : sx, d = isRot90 ? sx : sz;
    addCollisionBox(x, z, w, d, 0, 1.2);
  } else {
    const diag = Math.sqrt(sx * sx + sz * sz);
    addCollisionBox(x, z, diag, diag, 0, 1.2);
  }
}

/* ===========================================================================
   MERGE STATIC GEOMETRY BY MATERIAL FOR PERFORMANCE
   (manual merge using BufferGeometryUtils-equivalent logic embedded here
    since we cannot load an extra external module beyond three.min.js;
    implement minimal merge helper)
   =========================================================================== */
function mergeGeometriesForMaterial(mat) {
  const meshes = [];
  staticGroup.children.slice().forEach(child => {
    if (child.isMesh && child.material === mat) meshes.push(child);
  });
  if (meshes.length < 2) return;
  const geometries = meshes.map(m => {
    const g = m.geometry.clone();
    m.updateMatrix();
    g.applyMatrix4(m.matrix);
    return g;
  });
  const merged = mergeBufferGeometriesManual(geometries);
  meshes.forEach(m => staticGroup.remove(m));
  const mergedMesh = new THREE.Mesh(merged, mat);
  mergedMesh.castShadow = true;
  mergedMesh.receiveShadow = true;
  staticGroup.add(mergedMesh);
}

// Minimal manual buffer geometry merge (position, normal, uv) — avoids needing
// the separate BufferGeometryUtils script file, keeping this a single file.
function mergeBufferGeometriesManual(geometries) {
  // Convert every geometry to non-indexed FIRST, then size the output arrays
  // from those (post-triangulation) vertex counts. Sizing from the original
  // (possibly indexed) counts caused a buffer overflow, since toNonIndexed()
  // expands the vertex count.
  const nonIndexed = geometries.map(g => g.index ? g.toNonIndexed() : g);
  let totalVerts = 0;
  nonIndexed.forEach(g => totalVerts += g.attributes.position.count);
  const positions = new Float32Array(totalVerts * 3);
  const normals = new Float32Array(totalVerts * 3);
  const uvs = new Float32Array(totalVerts * 2);
  let offset = 0, uvOffset = 0;
  nonIndexed.forEach(g => {
    const pos = g.attributes.position.array;
    const norm = g.attributes.normal ? g.attributes.normal.array : new Float32Array(pos.length);
    const uv = g.attributes.uv ? g.attributes.uv.array : new Float32Array((pos.length / 3) * 2);
    positions.set(pos, offset * 3);
    normals.set(norm, offset * 3);
    uvs.set(uv, uvOffset * 2);
    offset += pos.length / 3;
    uvOffset += uv.length / 2;
  });
  const merged = new THREE.BufferGeometry();
  merged.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  merged.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
  merged.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  return merged;
}

// Merge the big material groups (walls/floor/ceiling) to cut draw calls drastically.
[plasterWallMat, woodFloorMat, ceilingMat, trimMat, kitchenFloorMat, ceramicFloorMat].forEach(mergeGeometriesForMaterial);

  joyDX = t.clientX - joyStartX;
  joyDY = t.clientY - joyStartY;
  const maxD = 40;
  const len = Math.hypot(joyDX, joyDY);
  if (len > maxD) { joyDX = joyDX / len * maxD; joyDY = joyDY / len * maxD; }
  joyStick.style.transform = `translate(${joyDX}px, ${joyDY}px)`;
  e.preventDefault();
}, { passive: false });

      lastLookX = t.clientX; lastLookY = t.clientY;
      const sens = 0.004;
      player.yaw -= dx * sens;
      player.pitch -= dy * sens;
      player.pitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, player.pitch));
    }

  e.preventDefault();
}, { passive: false });

/* ---- Collision resolution ---- */
function resolveCollisions(nextPos) {
  // Player AABB (square approximation of cylinder) at nextPos
  const r = PLAYER_RADIUS;
  for (const b of collisionBoxes) {
    if (b.minY > PLAYER_HEIGHT || b.maxY < 0.05) continue; // ignore boxes above player's head or below floor (allow stepping over tiny thresholds)
    // Skip very low boxes (like baseboards) for smoother movement except stair steps which are handled by minY too
    const closestX = Math.max(b.minX, Math.min(nextPos.x, b.maxX));
    const closestZ = Math.max(b.minZ, Math.min(nextPos.z, b.maxZ));
    const dx = nextPos.x - closestX;
    const dz = nextPos.z - closestZ;
    const distSq = dx * dx + dz * dz;
    if (distSq < r * r) {
      const dist = Math.sqrt(distSq) || 0.0001;
      const overlap = r - dist;
      nextPos.x += (dx / dist) * overlap;
      nextPos.z += (dz / dist) * overlap;
    }
  }
  return nextPos;
}

/* ---- Main animation loop ---- */
const clock = new THREE.Clock();
let fpsAccum = 0, fpsFrames = 0, fpsTimer = 0;
const fpsCounter = document.getElementById('fpsCounter');

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // FPS display
  fpsFrames++; fpsTimer += dt;
  if (fpsTimer >= 0.5) { fpsCounter.textContent = Math.round(fpsFrames / fpsTimer) + ' fps'; fpsFrames = 0; fpsTimer = 0; }

  if (mouseLocked || isTouchDevice()) {
    // Movement input
    let moveX = 0, moveZ = 0; // local space: X = strafe, Z = forward
    if (isTouchDevice()) {
      moveX = joyDX / 40;
      moveZ = joyDY / 40; // forward is -Y touch movement typically; joystick down = backward
    } else {
      if (keys['KeyW']) moveZ -= 1;
      if (keys['KeyS']) moveZ += 1;
      if (keys['KeyA']) moveX -= 1;
      if (keys['KeyD']) moveX += 1;
    }
    const len = Math.hypot(moveX, moveZ);
    if (len > 1) { moveX /= len; moveZ /= len; }

    const sprinting = isTouchDevice() ? sprintHeld : keys['ShiftLeft'] || keys['ShiftRight'];
    const speed = sprinting ? SPRINT_SPEED : WALK_SPEED;

    // Convert local move to world space based on yaw
    const sinY = Math.sin(player.yaw), cosY = Math.cos(player.yaw);
    const worldX = moveX * cosY - moveZ * sinY;
    const worldZ = moveX * sinY + moveZ * cosY;

    const nextPos = player.pos.clone();
    nextPos.x += worldX * speed * dt;
    nextPos.z += worldZ * speed * dt;

    resolveCollisions(nextPos);
    player.pos.x = nextPos.x;
    player.pos.z = nextPos.z;

    // Jump & gravity
    const jumpPressed = isTouchDevice() ? jumpRequested : keys['Space'];
    if (jumpPressed && player.onGround) {
      player.velY = JUMP_SPEED;
      player.onGround = false;
    }
    jumpRequested = false;

    player.velY += GRAVITY * dt;
    player.pos.y += player.velY * dt;
    if (player.pos.y <= 0) {
      player.pos.y = 0;
      player.velY = 0;
      player.onGround = true;
    }

    camera.position.set(player.pos.x, player.pos.y + EYE_HEIGHT, player.pos.z);
    camera.rotation.order = 'YXZ';
    camera.rotation.y = player.yaw;
    camera.rotation.x = player.pitch;
  }

  renderer.render(scene, camera);
}
animate();

   - collisionBoxes array can be reused/extended for interactive doors by
     converting static door pivots into dynamic-open colliders.
   =========================================================================== */
